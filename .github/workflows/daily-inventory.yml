name: "SUN'Y Daily Inventory Engine"

# Schedule disabled — inventory data now read from Cloud SQL (see SUN-684).
# The consolidated Amazon data pipeline (SUN-681) handles all SP-API fetches.
on:
  # schedule:
  #   - cron: "0 14 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  daily-run:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run inventory engine
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GOOGLE_SHEETS_CREDENTIALS_JSON: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS_JSON }}
          GOOGLE_SPREADSHEET_ID: ${{ secrets.GOOGLE_SPREADSHEET_ID }}
        run: python -m src.main
